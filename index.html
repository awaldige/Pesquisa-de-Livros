<!DOCTYPE html>
<html lang="pt-br" class="h-full bg-slate-50">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pesquisa de Livros</title>

  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>🔍</text></svg>">

  <script src="https://cdn.tailwindcss.com"></script>
  
  <link rel="stylesheet" href="style.css" />
</head>
<body class="h-full flex items-center justify-center p-4 antialiased text-slate-800">

  <main class="w-full max-w-2xl bg-white rounded-2xl shadow-sm border border-slate-200/80 p-6 md:p-8 space-y-6 transition-all">
    
    <header class="flex items-center gap-3">
      <div class="p-2.5 bg-indigo-50 text-indigo-600 rounded-xl">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
      </div>
      <h1 class="text-2xl font-bold tracking-tight text-slate-900">Pesquisa de Livros</h1>
    </header>

    <form id="formPesquisa" class="space-y-4">
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        
        <div class="flex flex-col gap-1.5">
          <label for="titulo" class="text-sm font-medium text-slate-700">Título do livro</label>
          <input 
            type="text" 
            id="titulo" 
            name="titulo" 
            placeholder="Ex: Dom Casmurro" 
            class="w-full px-3.5 py-2 rounded-xl border border-slate-300 bg-white placeholder-slate-400 text-slate-900 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition duration-200"
          />
        </div>

        <div class="flex flex-col gap-1.5">
          <label for="autor" class="text-sm font-medium text-slate-700">Autor</label>
          <input 
            type="text" 
            id="autor" 
            name="autor" 
            placeholder="Ex: Machado de Assis" 
            class="w-full px-3.5 py-2 rounded-xl border border-slate-300 bg-white placeholder-slate-400 text-slate-900 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition duration-200"
          />
        </div>
        
      </div>

      <div class="flex items-center justify-end gap-3 pt-2">
        <button 
          type="button" 
          id="limparBtn"
          class="px-4 py-2 text-sm font-medium text-slate-600 bg-slate-100 hover:bg-slate-200 active:bg-slate-300 rounded-xl transition duration-200"
        >
          Limpar
        </button>
        <button 
          type="submit"
          class="px-5 py-2 text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-800 rounded-xl shadow-sm hover:shadow transition duration-200"
        >
          Pesquisar
        </button>
      </div>
    </form>

    <div class="border-t border-slate-100 my-2"></div>

    <div 
      id="resultado" 
      aria-live="polite" 
      class="min-h-[50px] transition-all duration-300"
    >
      <p class="text-sm text-slate-400 text-center py-4">Digite os parâmetros acima para iniciar a busca.</p>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
