<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pesquisa de Livros</title>

  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>🔍</text></svg>">

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <h1>Pesquisa de Livros</h1>
    <form id="formPesquisa">
      <div>
        <label for="titulo">Título do livro:</label>
        <input type="text" id="titulo" name="titulo" placeholder="Ex: Dom Casmurro" />
      </div>

      <div>
        <label for="autor">Autor:</label>
        <input type="text" id="autor" name="autor" placeholder="Ex: Machado de Assis" />
      </div>

      <div style="display: flex; flex-wrap: wrap; gap: 10px;">
        <button type="submit">Pesquisar</button>
        <button type="button" id="limparBtn">Limpar</button>
      </div>
    </form>

    <hr />
    <div id="resultado"></div>
  </main>

  <script src="script.js"></script>
</body>
</html>
